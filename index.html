<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumbs · The trail begins</title>

  <!-- NORTHSTAR -->
  <!--
  Breadcrumbs is Reddit + GitHub, but neither.
  - Communities of practice (Reddit) + persistent trails (GitHub)
  - Low barrier to play, high value on completion
  - The feed is ephemeral. The trail is permanent.
  - Forking is how you learn. Peach recognizes sequences, not popularity.
  - The observer completes the loop.
  -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1208;
      color: #f5e6c8;
      font-family: 'Georgia', serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .crumb {
      background: rgba(245, 230, 200, 0.05);
      border: 1px solid rgba(232, 201, 106, 0.2);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: 3rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: #e8c96a;
    }

    .sub {
      color: #a08c6a;
      margin-bottom: 2rem;
      font-style: italic;
    }

    input {
      width: 100%;
      background: rgba(10, 8, 5, 0.8);
      border: 1px solid rgba(232, 201, 106, 0.3);
      border-radius: 48px;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      color: #f5e6c8;
      font-family: monospace;
      text-align: center;
      margin-bottom: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #e8c96a;
      box-shadow: 0 0 8px rgba(232, 201, 106, 0.3);
    }

    button {
      background: #e8c96a;
      color: #1a1208;
      border: none;
      border-radius: 48px;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    button:hover {
      background: #f0d87a;
      transform: scale(1.02);
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #5a4a2a;
    }

    .trail-preview {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      font-size: 0.8rem;
      color: #8a7a5a;
      display: none;
    }

    .trail-preview.visible {
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="crumb">
    <h1>Bread<span>crumbs</span></h1>
    <div class="sub">You are here. The trail starts when you do.</div>

    <input type="text" id="handleInput" placeholder="@handle" autocomplete="off">
    <button id="declareBtn">DECLARE →</button>

    <div class="note">
      No email. No password. Just a name and a trail.<br>
      Your identity is the cards you play.
    </div>

    <div id="trailPreview" class="trail-preview"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'breadcrumbs_trail';
  const HANDLE_KEY = 'breadcrumbs_handle';

  function getStoredHandle() {
    return localStorage.getItem(HANDLE_KEY);
  }

  function getStoredTrail() {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : { cards: [], unlocked: ['DECLARE'] };
  }

  function saveTrail(trail) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trail));
  }

  function addCardToTrail(cardName, metadata = {}) {
    const trail = getStoredTrail();
    trail.cards.push({
      card: cardName,
      timestamp: Date.now(),
      ...metadata
    });
    saveTrail(trail);
    return trail;
  }

  function declareHandle(handle) {
    // Normalize: lowercase, no spaces, @ prefix
    let clean = handle.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    if (!clean.startsWith('@')) clean = '@' + clean;
    if (clean === '@') return null;

    localStorage.setItem(HANDLE_KEY, clean);

    // Add DECLARE card to trail
    const trail = addCardToTrail('DECLARE', { handle: clean });

    // Unlock OBSERVE after DECLARE
    if (!trail.unlocked.includes('OBSERVE')) {
      trail.unlocked.push('OBSERVE');
      saveTrail(trail);
    }

    return clean;
  }

  function showPreview(handle) {
    const previewDiv = document.getElementById('trailPreview');
    const trail = getStoredTrail();

    previewDiv.innerHTML = `
      <strong>✨ ${handle}</strong><br>
      Cards played: ${trail.cards.length}<br>
      Unlocked: ${trail.unlocked.join(', ')}<br>
      → <a href="session.html" style="color:#e8c96a;">Enter the council feed →</a>
    `;
    previewDiv.classList.add('visible');
  }

  // On load, check if user already has a handle
  window.addEventListener('DOMContentLoaded', () => {
    const existing = getStoredHandle();
    if (existing) {
      document.getElementById('handleInput').value = existing;
      showPreview(existing);
    }
  });

  document.getElementById('declareBtn').addEventListener('click', () => {
    const input = document.getElementById('handleInput');
    const handle = declareHandle(input.value);

    if (!handle) {
      alert('Please enter a valid handle (letters, numbers, underscore)');
      return;
    }

    showPreview(handle);

    // OPTIONAL: Broadcast this DECLARE to the council feed (GitHub Issue)
    // We'll implement cross-user sync in the next commit
  });
</script>

</body>
</html>
